name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          base: ""
          plugin_leetcode: yes
          plugin_leetcode_user: YaswanthKesuboyina
          plugin_leetcode_sections: solved,skills,recent
